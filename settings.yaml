# -*- coding: utf-8 -*-
# 日志分析工具配置文件
# Log Analysis Tool Configuration

paths:
  input_dir: "./data/input"
  output_dir: "./build/dist"
  readonly_files:
    - "./data/input/legacy.log"

file_formats:
  allowed_extensions:
    - ".log"
  report_format: ".md"
  stats_format: ".json"

naming:
  output_prefix: "log_report_"
  timestamp_format: "%Y%m%d_%H%M%S"

log_parsing:
  log_levels:
    - "DEBUG"
    - "INFO"
    - "WARNING"
    - "ERROR"
    - "CRITICAL"
  exception_levels:
    - "ERROR"
    - "WARNING"
    - "CRITICAL"
  timestamp_pattern: "\\d{4}-\\d{2}-\\d{2}\\s+\\d{2}:\\d{2}:\\d{2}"
  ip_pattern: "\\b(?:\\d{1,3}\\.){3}\\d{1,3}\\b"

filters:
  skip_keywords:
    - "DEBUG"
  min_line_length: 10
  max_line_length: 2048

statistics:
  keyword_stats:
    - "error"
    - "warning"
    - "login"
    - "request"
    - "response"
    - "database"
    - "connection"
    - "failed"
  top_n_limit: 10

encoding: "utf-8"
